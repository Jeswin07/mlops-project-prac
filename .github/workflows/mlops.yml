name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install dvc

    - name: Run training
      run: |
        python src/train.py

    - name: Run evaluation
      run: |
        python src/evaluate.py

    - name: Run tests
      run: pytest